    <!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Jogo 3D Realista</title>
<style>
body { margin: 0; overflow: hidden; }
canvas { display: block; }
#hud {
  position: absolute;
  top: 10px;
  left: 10px;
  color: white;
  font-family: Arial;
  font-size: 18px;
}
</style>
</head>
<body>

<div id="hud">Velocidade: 0</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
let scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

// câmera
let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);

// render
let renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// luz
let light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5,10,7);
scene.add(light);

// chão
let groundGeo = new THREE.PlaneGeometry(200, 200);
let groundMat = new THREE.MeshStandardMaterial({ color: 0x228B22 });
let ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
scene.add(ground);

// estrada
let roadGeo = new THREE.PlaneGeometry(10, 200);
let roadMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
let road = new THREE.Mesh(roadGeo, roadMat);
road.rotation.x = -Math.PI / 2;
road.position.y = 0.01;
scene.add(road);

// carro
let carGeo = new THREE.BoxGeometry(1, 0.5, 2);
let carMat = new THREE.MeshStandardMaterial({ color: 0x0000ff });
let car = new THREE.Mesh(carGeo, carMat);
car.position.y = 0.25;
scene.add(car);

// variáveis
let speed = 0;
let keys = {};

// controles
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

// loop
function animate() {
    requestAnimationFrame(animate);

    // aceleração
    if (keys["ArrowUp"]) speed += 0.01;
    if (keys["ArrowDown"]) speed -= 0.01;

    // limite
    speed *= 0.98;

    // direção
    if (keys["ArrowLeft"]) car.rotation.y += 0.03;
    if (keys["ArrowRight"]) car.rotation.y -= 0.03;

    // movimento
    car.position.x -= Math.sin(car.rotation.y) * speed;
    car.position.z -= Math.cos(car.rotation.y) * speed;

    // câmera seguindo carro
    camera.position.x = car.position.x + Math.sin(car.rotation.y) * 5;
    camera.position.z = car.position.z + Math.cos(car.rotation.y) * 5;
    camera.position.y = 3;

    camera.lookAt(car.position);

    // HUD
    document.getElementById("hud").innerText = "Velocidade: " + (speed*100).toFixed(0);

    renderer.render(scene, camera);
}

animate();
</script>

</body>
</html>
</html>
